{% extends 'base.html' %}
{% block content %}

<h2>Daily Revenue</h2>
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = [
{% for d in data %}
"{{ d.day|date:'d M' }}",
{% endfor %}
];

const values = [
{% for d in data %}
{{ d.total }},
{% endfor %}
];

new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Daily Revenue',
            data: values
        }]
    }
});
</script>

{% endblock %}
