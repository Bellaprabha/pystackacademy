{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-white mb-4">📈 Revenue Chart</h2>

    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = [
    {% for d in data %}
        "{{ d.month|date:'M Y' }}",
    {% endfor %}
];

const values = [
    {% for d in data %}
        {{ d.total }},
    {% endfor %}
];

const data = {
    labels: labels,
    datasets: [{
        label: 'Revenue',
        data: values,
    }]
};

new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: data
});
</script>

{% endblock %}
