{% extends 'base.html' %}

{% block content %}

<div class="card p-5 text-center">
    <h3>Pay for {{ course.title }}</h3>
    <p><strong>Amount:</strong> ₹{{ display_amount }}</p>

    <button id="pay-btn" class="btn btn-success">Pay Now</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ key }}",
    "amount": "{{ amount }}",
    "currency": "INR",
    "name": "PyStack Academy",
    "description": "Course Payment",
    "order_id": "{{ order_id }}",

    // ✅ SUCCESS FLOW
    "handler": function (response){

        fetch("/payments/verify/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(response)
        })
        .then(res => res.text())
        .then(data => {
            if (data === "OK") {
                alert("Payment Successful ✅");
                window.location.href = "/payments/success/";
            } else {
                alert("Payment Failed ❌");
                window.location.href = "/payments/failure/?course_id={{ course.id }}";
            }
        });
    },

    // ❌ USER CLOSE / FAILURE
    "modal": {
        "ondismiss": function(){
            alert("Payment Cancelled ❌");
            window.location.href = "/payments/failure/?course_id={{ course.id }}";
        }
    },

    "prefill": {
        "name": "{{ request.user.username }}",
        "email": "{{ request.user.email }}"
    },

    "theme": {
        "color": "#3399cc"
    }
};

var rzp = new Razorpay(options);

document.getElementById('pay-btn').onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

{% endblock %}
